<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marwa Pro - Floating Menu</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --navy: #020617;
            --gold: #d4af37;
            --editor-bg: #0f172a;
            --glass: rgba(15, 23, 42, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--navy);
            height: 100vh;
            display: flex;
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            color: white;
            padding: 10px;
        }

        /* --- الكبسولة العائمة الذكية --- */
        .sidebar-container {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 2000;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* زر إظهار/إخفاء القائمة */
        .toggle-menu-btn {
            background: var(--gold);
            color: black;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .floating-sidebar {
            width: 70px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            transition: 0.4s;
            overflow: hidden;
        }

        /* إخفاء القائمة */
        .sidebar-container.collapsed .floating-sidebar {
            height: 0;
            padding: 0;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.8);
        }

        .user-img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            object-fit: cover;
            margin-bottom: 5px;
        }

        .side-btn {
            background: none; border: none; color: #94a3b8;
            cursor: pointer; display: flex; flex-direction: column; align-items: center;
            transition: 0.2s; width: 100%;
        }
        .side-btn i { font-size: 1.6rem; }
        .side-btn span { font-size: 0.55rem; margin-top: 4px; font-weight: bold; white-space: nowrap; }
        .side-btn:hover, .side-btn.active { color: var(--gold); }
        .side-btn.danger:hover { color: #ff5e5e; }

        /* --- منطقة العمل --- */
        .main-layout {
            flex: 1;
            display: flex;
            gap: 15px;
            width: 100%;
            height: 100%;
            transition: 0.4s;
        }

        /* تحسين استجابة حجم الشاشة */
        .editor-panel {
            flex: 1;
            max-width: 45%;
            background: var(--editor-bg);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: 0.4s;
        }
        .editor-panel.hidden { width: 0; max-width: 0; opacity: 0; }

        textarea#codeEditor {
            flex: 1; width: 100%; padding: 25px; background: transparent;
            color: #bae6fd; font-family: 'Fira Code', monospace;
            font-size: 14px; line-height: 1.6; resize: none; border: none; outline: none;
        }

        .preview-panel {
            flex: 2;
            background: #000;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .preview-content {
            width: 100%; height: 100%;
            background: #fff;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* وضع الهاتف الاحترافي */
        .preview-panel.mobile-view .preview-content {
            width: 375px;
            height: 90%;
            border-radius: 35px;
            border: 8px solid #222;
        }

        iframe { width: 100%; height: 100%; border: none; border-radius: inherit; }

        /* تنبيهات */
        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--gold); color: #000; padding: 10px 30px;
            border-radius: 50px; font-weight: bold; display: none; z-index: 3000;
        }

        /* استجابة للهاتف */
        @media (max-width: 768px) {
            .sidebar-container { 
                top: auto; bottom: 20px; left: 50%; right: auto; 
                transform: translateX(-50%); flex-direction: column-reverse; width: 90%;
            }
            .floating-sidebar { flex-direction: row; width: 100%; height: 70px; justify-content: space-around; padding: 0; }
            .sidebar-container.collapsed .floating-sidebar { width: 0; height: 0; }
            .main-layout { flex-direction: column; padding-bottom: 80px; }
            .editor-panel { max-width: 100%; height: 50%; }
        }
    </style>
</head>
<body>

    <div class="sidebar-container" id="sideContainer">
        <button class="toggle-menu-btn" onclick="toggleMenu()" title="عرض/إخفاء القائمة">
            <i class="material-icons" id="menuIcon">menu_open</i>
        </button>

        <nav class="floating-sidebar">
            <img src="https://iili.io/fbckoRn.md.jpg" alt="M" class="user-img">

            <button class="side-btn" onclick="toggleEditor()" id="btnCode">
                <i class="material-icons">code</i>
                <span>كتابة كود</span>
            </button>

            <button class="side-btn" onclick="toggleView()" id="btnView">
                <i class="material-icons">smartphone</i>
                <span>عرض شاشة</span>
            </button>

            <button class="side-btn" onclick="doPaste()">
                <i class="material-icons">content_paste</i>
                <span>لصق كود</span>
            </button>

            <button class="side-btn danger" onclick="doClear()">
                <i class="material-icons">delete_sweep</i>
                <span>حذف كود</span>
            </button>
        </nav>
    </div>

    <div class="main-layout" id="mainLayout">
        <section class="editor-panel" id="editorPanel">
            <div style="padding: 12px 20px; background: rgba(0,0,0,0.3); font-size: 0.7rem; color: var(--gold); font-weight: bold; display: flex; justify-content: space-between;">
                <span>MARWA PRO EDITOR</span>
                <span id="charCount">0 characters</span>
            </div>
            <textarea id="codeEditor" spellcheck="false" placeholder="الصق الكود هنا..."></textarea>
        </section>

        <section class="preview-panel" id="previewArea">
            <div class="preview-content">
                <iframe id="output"></iframe>
            </div>
        </section>
    </div>

    <div id="toast"></div>

    <script>
        const editor = document.getElementById('codeEditor');
        const output = document.getElementById('output');
        const editorPanel = document.getElementById('editorPanel');
        const previewArea = document.getElementById('previewArea');
        const sideContainer = document.getElementById('sideContainer');
        const menuIcon = document.getElementById('menuIcon');

        function update() {
            const doc = output.contentWindow.document;
            doc.open();
            doc.write(editor.value);
            doc.close();
            document.getElementById('charCount').innerText = editor.value.length + " characters";
        }

        // إظهار وإخفاء القائمة العائمة
        function toggleMenu() {
            sideContainer.classList.toggle('collapsed');
            menuIcon.innerText = sideContainer.classList.contains('collapsed') ? 'apps' : 'menu_open';
        }

        function toggleEditor() {
            editorPanel.classList.toggle('hidden');
            showToast(editorPanel.classList.contains('hidden') ? "تم إخفاء المحرر" : "تم فتح المحرر");
        }

        function toggleView() {
            previewArea.classList.toggle('mobile-view');
            const isMobile = previewArea.classList.contains('mobile-view');
            showToast(isMobile ? "وضع الهاتف" : "وضع الشاشة الكاملة");
        }

        async function doPaste() {
            try {
                const text = await navigator.clipboard.readText();
                if(text) {
                    editor.value = text;
                    update();
                    showToast("تم اللصق المباشر");
                }
            } catch(e) { showToast("يرجى منح إذن اللصق"); }
        }

        function doClear() {
            editor.value = "";
            update();
            showToast("تم الحذف");
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 1500);
        }

        editor.value = `<div style="padding:40px; text-align:center; height:100vh; display:flex; flex-direction:column; justify-content:center; background:#fff; font-family:sans-serif;">
    <h1 style="color:#d4af37;">Marwa Mods V4.0</h1>
    <p>جربي زر "المينو" الذهبي لإخفاء الأدوات!</p>
</div>`;

        editor.addEventListener('input', update);
        window.onload = update;
    </script>
</body>
</html>
