<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>النظام الملكي V17</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: #000;
            height: 100vh;
            overflow: hidden;
            font-family: system-ui, sans-serif;
        }

        /* زر القائمة العائم */
        .menu-trigger {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 2000;
            cursor: pointer;
            background: rgba(0, 255, 204, 0.15);
            padding: 10px;
            border-radius: 12px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 255, 204, 0.4);
            transition: 0.3s;
        }
        .menu-trigger svg { fill: #00ffcc; width: 30px; height: 30px; }

        /* القائمة الجانبية (نصف الشاشة) */
        .side-panel {
            position: fixed;
            top: 0;
            right: -50%;
            width: 50%;
            height: 100%;
            background: #0a0a0a;
            z-index: 1999;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            border-left: 2px solid #00ffcc;
        }
        .side-panel.active { transform: translateX(-100%); }

        /* شريط الأيقونات */
        .icon-bar {
            display: flex;
            justify-content: space-around;
            padding: 20px 10px;
            background: #111;
            border-bottom: 1px solid #222;
        }
        .btn-icon {
            background: none;
            border: none;
            cursor: pointer;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .btn-icon svg { width: 28px; height: 28px; fill: currentColor; }
        .btn-icon.paste { color: #00ffcc; }
        .btn-icon.delete { color: #ff5f56; }
        .btn-icon.close { color: #eab308; }

        /* المحرر */
        .editor {
            flex: 1;
            background: transparent;
            color: #00ff88;
            padding: 20px;
            font-family: 'Consolas', monospace;
            font-size: 16px;
            border: none;
            outline: none;
            resize: none;
        }

        /* حاوية العرض لمنع التعليق */
        .viewer-container {
            width: 100%;
            height: 100vh;
            background: #fff;
            overflow: auto; /* يسمح بالتمرير الداخلي */
            -webkit-overflow-scrolling: touch;
        }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="menu-trigger" onclick="toggleMenu()">
        <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
    </div>

    <div class="side-panel" id="panel">
        <div class="icon-bar">
            <button class="btn-icon paste" onclick="doPaste()"><svg viewBox="0 0 24 24"><path d="M19 2h-4.18C14.4.84 13.3 0 12 0c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm7 18H5V4h2v3h10V4h2v16z"/></svg></button>
            <button class="btn-icon delete" onclick="doDelete()"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>
            <button class="btn-icon close" onclick="toggleMenu()"><svg viewBox="0 0 24 24"><path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z"/></svg></button>
        </div>
        <textarea id="codeEditor" class="editor" placeholder="ألصق كودك هنا..." spellcheck="false"></textarea>
    </div>

    <div class="viewer-container">
        <iframe id="output"></iframe>
    </div>

    <script>
        const panel = document.getElementById('panel');
        const editor = document.getElementById('codeEditor');
        const output = document.getElementById('output');
        let timeout;

        function toggleMenu() { panel.classList.toggle('active'); }

        // تحسين الأداء: تحديث ذكي يمنع الـ "لاك"
        function update() {
            const content = editor.value;
            const doc = output.contentWindow.document;
            doc.open();
            doc.write(content);
            doc.close();
        }

        // خاصية الـ Debounce: تنتظر توقف الكتابة قليلاً قبل التحديث
        editor.addEventListener('input', () => {
            clearTimeout(timeout);
            timeout = setTimeout(update, 300); 
        });

        function doDelete() { editor.value = ""; update(); }

        async function doPaste() {
            try {
                const text = await navigator.clipboard.readText();
                editor.value += text;
                update();
            } catch (err) {}
        }

        window.onload = () => {
            editor.value = `<div style="height:200vh; background:linear-gradient(#eecda3, #ef629f); padding:50px; text-align:center; font-family:sans-serif;">
                <h1>تم حل مشكلة الـ "لاك" ✅</h1>
                <p>جرب الآن التمرير (Scroll) لأسفل، ستجد السلاسة فائقة.</p>
                <div style="margin-top:500px;">نهاية الصفحة - التمرير يعمل بامتياز</div>
            </div>`;
            update();
        };
    </script>
</body>
</html>
