<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marwa Pro Editor - Final Edition</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --navy: #020617;
            --gold: #d4af37;
            --editor-bg: #0f172a;
            --border-gold: rgba(212, 175, 55, 0.3);
            --header-h: 60px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--navy);
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* --- Header --- */
        .app-header {
            height: var(--header-h);
            background: #000;
            border-bottom: 1px solid var(--border-gold);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
        }

        .brand { display: flex; align-items: center; gap: 10px; font-weight: 900; color: var(--gold); }
        .brand img { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--gold); }

        /* --- Workspace --- */
        .workspace {
            flex: 1;
            display: flex;
            position: relative;
            background: #050a15;
        }

        /* Editor Panel */
        .editor-panel {
            width: 45%;
            background: var(--editor-bg);
            border-left: 1px solid var(--border-gold);
            display: flex;
            flex-direction: column;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .editor-panel.hidden { width: 0; opacity: 0; pointer-events: none; }

        textarea#codeEditor {
            flex: 1;
            width: 100%;
            padding: 20px;
            background: transparent;
            color: #9cdcfe;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            border: none;
            outline: none;
        }

        /* Preview Panel */
        .preview-panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111; /* خلفية داكنة لإبراز المعاينة */
            overflow: hidden;
            transition: 0.3s;
        }

        .iframe-container {
            width: 100%;
            height: 100%;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: #fff;
        }

        /* وضع الهاتف الحقيقي */
        .preview-panel.mobile-mode .iframe-container {
            width: 375px;
            height: 812px; /* أبعاد iPhone X */
            border: 12px solid #333;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        iframe { width: 100%; height: 100%; border: none; border-radius: inherit; }

        /* --- Floating Bar --- */
        .floating-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.85);
            padding: 8px 15px;
            border-radius: 30px;
            border: 1px solid var(--border-gold);
            backdrop-filter: blur(10px);
            z-index: 2000;
        }

        .btn {
            background: none; border: none; color: var(--gold);
            cursor: pointer; display: flex; flex-direction: column; align-items: center;
            padding: 5px 10px; border-radius: 15px; transition: 0.2s;
        }
        .btn i { font-size: 1.4rem; }
        .btn span { font-size: 0.65rem; margin-top: 3px; font-weight: bold; }
        .btn:hover { background: rgba(212, 175, 55, 0.15); color: #fff; }
        .btn.active { color: #fff; background: var(--gold); color: #000; }

        /* Toast */
        #toast {
            position: fixed; top: 75px; left: 50%; transform: translateX(-50%);
            background: var(--gold); color: #000; padding: 5px 20px;
            border-radius: 20px; font-size: 0.8rem; font-weight: bold;
            display: none; z-index: 3000;
        }

        /* الموبايل الحقيقي */
        @media (max-width: 768px) {
            .editor-panel { position: absolute; inset: 0; width: 100%; z-index: 100; transform: translateY(100%); }
            .editor-panel.mobile-show { transform: translateY(0); }
            .preview-panel.mobile-mode .iframe-container { width: 95%; height: 90%; }
        }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="brand">
            <img src="https://iili.io/fbckoRn.md.jpg" alt="M">
            <span>MARWA MODS</span>
        </div>
        <div style="font-size: 0.7rem; color: #666;">v3.0 FINAL</div>
    </header>

    <div class="workspace">
        <section class="editor-panel" id="editorPanel">
            <textarea id="codeEditor" spellcheck="false" placeholder="الصق الكود هنا..."></textarea>
        </section>

        <section class="preview-panel" id="previewArea">
            <div class="iframe-container">
                <iframe id="output"></iframe>
            </div>
        </section>
    </div>

    <div class="floating-bar">
        <button class="btn" onclick="toggleFullView()" id="viewBtn">
            <i class="material-icons">visibility</i>
            <span>إخفاء الكود</span>
        </button>
        
        <button class="btn" onclick="toggleMobileMode()" id="phoneBtn">
            <i class="material-icons">smartphone</i>
            <span>وضع الهاتف</span>
        </button>

        <button class="btn" onclick="doPaste()">
            <i class="material-icons">content_paste</i>
            <span>لصق</span>
        </button>

        <button class="btn" onclick="doDelete()" style="color: #ff4d4d;">
            <i class="material-icons">delete_sweep</i>
            <span>مسح</span>
        </button>
    </div>

    <div id="toast"></div>

    <script>
        const editor = document.getElementById('codeEditor');
        const output = document.getElementById('output');
        const editorPanel = document.getElementById('editorPanel');
        const previewArea = document.getElementById('previewArea');
        const phoneBtn = document.getElementById('phoneBtn');
        const viewBtn = document.getElementById('viewBtn');

        // كود البداية
        const welcome = `<div style="padding:40px; text-align:center; font-family:sans-serif;">
            <h1 style="color:#d4af37;">تم تفعيل المعاينة!</h1>
            <p>جربي الضغط على "وضع الهاتف" لرؤية السحر</p>
        </div>`;
        editor.value = welcome;

        function update() {
            const doc = output.contentWindow.document;
            doc.open();
            doc.write(editor.value);
            doc.close();
        }

        // 1. زر إخفاء/إظهار الكود
        function toggleFullView() {
            if (window.innerWidth <= 768) {
                editorPanel.classList.toggle('mobile-show');
            } else {
                editorPanel.classList.toggle('hidden');
                const isHidden = editorPanel.classList.contains('hidden');
                viewBtn.querySelector('i').innerText = isHidden ? 'edit' : 'visibility';
                viewBtn.querySelector('span').innerText = isHidden ? 'تعديل الكود' : 'إخفاء الكود';
            }
        }

        // 2. زر محاكاة الهاتف (المعاينة الحقيقية)
        function toggleMobileMode() {
            previewArea.classList.toggle('mobile-mode');
            const isActive = previewArea.classList.contains('mobile-mode');
            phoneBtn.classList.toggle('active');
            showToast(isActive ? "تم تفعيل محاكي الهاتف" : "وضع الشاشة الكاملة");
        }

        // 3. اللصق الفوري
        async function doPaste() {
            const text = await navigator.clipboard.readText();
            editor.value = text;
            update();
            showToast("تم اللصق");
        }

        // 4. الحذف الفوري
        function doDelete() {
            editor.value = "";
            update();
            showToast("تم الحذف");
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 1500);
        }

        editor.addEventListener('input', update);
        window.onload = update;
    </script>
</body>
</html>
