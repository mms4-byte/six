<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>النظام الملكي V18 - المرن</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body {
            background-color: #000;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* زر القائمة */
        .menu-trigger {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 2000;
            cursor: pointer;
            background: rgba(0, 255, 204, 0.2);
            padding: 10px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 204, 0.5);
        }
        .menu-trigger svg { fill: #00ffcc; width: 30px; height: 30px; }

        /* القائمة الجانبية */
        .side-panel {
            position: fixed;
            top: 0;
            right: -100%; /* مخفية بالكامل */
            width: 80%; /* عرض مناسب للموبايل */
            max-width: 400px;
            height: 100%;
            background: rgba(10, 10, 10, 0.98);
            z-index: 1999;
            transition: 0.3s ease;
            display: flex;
            flex-direction: column;
            border-left: 2px solid #00ffcc;
        }
        .side-panel.active { right: 0; }

        .icon-bar {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: #111;
            border-bottom: 1px solid #222;
        }
        .btn-icon { background: none; border: none; cursor: pointer; color: #fff; }
        .btn-icon svg { width: 28px; height: 28px; fill: currentColor; }
        .btn-icon.paste { color: #00ffcc; }
        .btn-icon.delete { color: #ff5f56; }

        .editor {
            flex: 1;
            background: transparent;
            color: #00ff88;
            padding: 15px;
            font-family: monospace;
            font-size: 16px;
            border: none;
            outline: none;
            resize: none;
        }

        /* حاوية العرض المتمددة تلقائياً */
        .viewer-container {
            flex: 1; /* تأخذ كل المساحة المتبقية في الـ body */
            width: 100%;
            background: #fff;
            position: relative;
        }
        
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="menu-trigger" onclick="toggleMenu()">
        <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
    </div>

    <div class="side-panel" id="panel">
        <div class="icon-bar">
            <button class="btn-icon paste" onclick="doPaste()"><svg viewBox="0 0 24 24"><path d="M19 2h-4.18C14.4.84 13.3 0 12 0c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm7 18H5V4h2v3h10V4h2v16z"/></svg></button>
            <button class="btn-icon delete" onclick="doDelete()"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>
            <button class="btn-icon" style="color:#eee" onclick="toggleMenu()"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button>
        </div>
        <textarea id="codeEditor" class="editor" placeholder="ألصق كودك هنا..." spellcheck="false"></textarea>
    </div>

    <div class="viewer-container">
        <iframe id="output"></iframe>
    </div>

    <script>
        const panel = document.getElementById('panel');
        const editor = document.getElementById('codeEditor');
        const output = document.getElementById('output');
        let updateTimer;

        function toggleMenu() { panel.classList.toggle('active'); }

        function update() {
            const content = editor.value;
            const doc = output.contentWindow.document;
            doc.open();
            // إضافة ستايل بسيط لجعل محتوى الكود المكتوب يتناسب مع حجم الشاشة تلقائياً
            doc.write('<style>body{margin:0; width:100%; height:100%;}</style>' + content);
            doc.close();
        }

        editor.addEventListener('input', () => {
            clearTimeout(updateTimer);
            updateTimer = setTimeout(update, 300); 
        });

        function doDelete() { editor.value = ""; update(); }

        async function doPaste() {
            try {
                const text = await navigator.clipboard.readText();
                editor.value += text;
                update();
            } catch (err) {}
        }

        window.onload = () => {
            editor.value = `<div style="padding:20px; text-align:center; font-family:sans-serif;">
                <h2 style="color:#0077ff;">شاشة عرض مرنة</h2>
                <p>هذه الشاشة تتمدد تلقائياً لتناسب حجم متصفحك.</p>
            </div>`;
            update();
        };
    </script>
</body>
</html>
