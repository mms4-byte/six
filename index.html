<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>النظام الملكي V18 - العرض الكامل</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body {
            background-color: #050505;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* زر القائمة */
        .menu-trigger {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 2000;
            cursor: pointer;
            background: rgba(0, 255, 204, 0.1);
            padding: 8px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(0, 255, 204, 0.3);
        }
        .menu-trigger svg { fill: #00ffcc; width: 25px; height: 25px; }

        /* القائمة الجانبية */
        .side-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 85%;
            max-width: 400px;
            height: 100%;
            background: #0a0a0a;
            z-index: 1999;
            transition: 0.3s ease-in-out;
            display: flex;
            flex-direction: column;
            border-left: 2px solid #00ffcc;
        }
        .side-panel.active { right: 0; }

        .editor {
            flex: 1;
            background: transparent;
            color: #00ff88;
            padding: 15px;
            font-family: monospace;
            font-size: 14px;
            border: none;
            outline: none;
            resize: none;
        }

        /* شاشة العرض تملأ المساحة بالكامل */
        .viewer-container {
            flex: 1;
            width: 100%;
            height: 100%;
            background: #000;
        }
        
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none;
            display: block;
        }

        .icon-bar {
            padding: 10px;
            background: #111;
            display: flex;
            gap: 10px;
        }
        .btn {
            background: #222;
            color: #00ffcc;
            border: 1px solid #00ffcc;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="menu-trigger" onclick="toggleMenu()">
        <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
    </div>

    <div class="side-panel" id="panel">
        <div class="icon-bar">
            <button class="btn" onclick="doPaste()">لصق</button>
            <button class="btn" onclick="doDelete()">مسح</button>
            <button class="btn" onclick="toggleMenu()" style="color:white">إغلاق</button>
        </div>
        <textarea id="codeEditor" class="editor" placeholder="ضع كود الإمساكية هنا..." spellcheck="false"></textarea>
    </div>

    <div class="viewer-container">
        <iframe id="output"></iframe>
    </div>

    <script>
        const panel = document.getElementById('panel');
        const editor = document.getElementById('codeEditor');
        const output = document.getElementById('output');

        function toggleMenu() { panel.classList.toggle('active'); }

        function update() {
            const content = editor.value;
            const doc = output.contentWindow.document;
            doc.open();
            // حقن ستايل يضمن ملء الشاشة داخل الـ iframe
            doc.write(`
                <!DOCTYPE html>
                <html lang="ar" dir="rtl">
                <head>
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <style>
                        body { 
                            margin: 0; 
                            padding: 0; 
                            width: 100%; 
                            min-height: 100vh; 
                            background-color: #0b0f19; /* لون الخلفية المظلمة */
                            color: white;
                            display: flex;
                            flex-direction: column;
                            align-items: center;
                        }
                        /* جعل الجداول والصور لا تخرج عن إطار الشاشة */
                        table, div, img { max-width: 100%; height: auto; }
                    </style>
                </head>
                <body>
                    ${content}
                </body>
                </html>
            `);
            doc.close();
        }

        editor.addEventListener('input', update);
        function doDelete() { editor.value = ""; update(); }
        async function doPaste() {
            try {
                const text = await navigator.clipboard.readText();
                editor.value += text;
                update();
            } catch (err) {}
        }
    </script>
</body>
</html>
