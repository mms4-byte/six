<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marwa Mohammed - Pro Editor</title>
    
    <!-- الخطوط والأيقونات -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --royal-navy: #020617;
            --royal-gold: #d4af37;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --border-gold: rgba(212, 175, 55, 0.3);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --editor-bg: #0f172a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--royal-navy);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Cairo', sans-serif;
            display: flex;
            flex-direction: column;
            color: var(--text-main);
        }

        /* خلفية متحركة */
        .bg-layer { 
            position: fixed; inset: 0; z-index: 0; 
            background: radial-gradient(circle at top right, #0f172a, #020617); 
            pointer-events: none;
        }

        /* --- Header (Pro Style) --- */
        .app-header {
            height: 80px;
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-gold);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
            position: relative;
        }

        /* أزرار التحكم */
        .header-tools {
            display: flex;
            gap: 15px;
            z-index: 1002;
        }

        .tool-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: 0.2s;
        }

        .tool-btn {
            width: 50px; height: 50px;
            border-radius: 15px;
            background: var(--glass-bg);
            border: 1px solid var(--border-gold);
            color: var(--royal-gold);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .tool-btn:hover, .tool-btn.active {
            background: var(--royal-gold);
            color: var(--royal-navy);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            transform: translateY(-3px);
        }

        .tool-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 700;
        }

        /* شعار البروفايل في المنتصف */
        .profile-container {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-gold);
            border-radius: 25px;
            padding: 8px 20px 8px 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .profile-img {
            width: 45px; height: 45px;
            border-radius: 50%;
            border: 2px solid var(--royal-gold);
            overflow: hidden;
        }
        .profile-img img { width: 100%; height: 100%; object-fit: cover; }

        .profile-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .profile-name {
            font-size: 1.1rem;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .verified-icon {
            color: #3b82f6;
            font-size: 18px;
            filter: drop-shadow(0 0 5px rgba(59, 130, 246, 0.5));
        }

        /* --- Viewer Area --- */
        .viewer-area {
            flex: 1;
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 20px;
        }

        iframe {
            border: none;
            background: #fff;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Mobile Frame */
        .mobile-mode iframe {
            width: 375px; height: 812px;
            border-radius: 40px;
            border: 12px solid #1e293b;
            position: relative;
            z-index: 10;
            box-shadow: 0 0 0 2px var(--royal-gold), 0 25px 50px rgba(0,0,0,0.6);
        }
        .mobile-mode iframe::before {
            content: ''; position: absolute; top: -12px; left: 50%;
            transform: translateX(-50%);
            width: 150px; height: 30px;
            background: #1e293b;
            border-bottom-left-radius: 20px; border-bottom-right-radius: 20px;
            z-index: 20;
        }

        /* Desktop Mode */
        .desktop-mode iframe {
            width: 100%; height: 100%;
            border-radius: 12px;
            border: 1px solid var(--border-gold);
        }

        /* --- Sidebar (Royal Style) --- */
        .sidebar {
            position: fixed;
            top: 0; right: -100%;
            width: 100%;
            max-width: 550px;
            height: 100%;
            background: #020617;
            z-index: 2000;
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border-gold);
            box-shadow: -20px 0 60px rgba(0,0,0,0.8);
        }

        .sidebar.open { right: 0; }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-gold);
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to right, rgba(212, 175, 55, 0.1), transparent);
        }

        .sidebar-title { font-weight: 800; color: var(--royal-gold); font-size: 1.2rem; display: flex; align-items: center; gap: 10px;}
        
        .close-sidebar {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border-gold); 
            color: var(--royal-gold);
            width: 35px; height: 35px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
        }
        .close-sidebar:hover { background: var(--royal-gold); color: var(--royal-navy); }

        .editor-wrapper {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* High Performance Editor */
        .code-wrapper {
            flex: 1;
            background: var(--editor-bg);
            border-radius: 15px;
            border: 1px solid var(--border-gold);
            overflow: hidden;
            position: relative;
        }

        textarea#codeEditor {
            width: 100%; height: 100%;
            padding: 20px;
            background: transparent;
            color: #e2e8f0;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            border: none;
            white-space: pre;
            overflow: auto;
        }

        /* Action Buttons */
        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            gap: 10px;
            transition: 0.2s;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary { 
            background: linear-gradient(135deg, var(--royal-gold), #b4932a); 
            color: #000; 
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }
        .btn-primary:active { transform: scale(0.98); }

        .btn-danger { 
            background: rgba(239, 68, 68, 0.1); 
            color: #ef4444; 
            border: 1px solid rgba(239, 68, 68, 0.3); 
        }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.2); }

        /* --- Toast --- */
        .toast-container {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            z-index: 3000;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
        }
        .toast-container.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        .toast {
            background: rgba(2, 6, 23, 0.95);
            border: 1px solid var(--royal-gold);
            color: #fff;
            padding: 12px 24px;
            border-radius: 50px;
            display: flex; align-items: center; gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            font-size: 0.9rem;
        }
        .toast i { color: var(--royal-gold); }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 1500;
            opacity: 0; pointer-events: none;
            transition: 0.3s;
        }
        .overlay.active { opacity: 1; pointer-events: all; }

        @media (max-width: 480px) {
            .sidebar { width: 100%; max-width: 100%; }
            .mobile-mode iframe { width: 92%; height: 82%; border-width: 8px; }
            .profile-container { display: none; } /* إخفاء البروفايل في الموبايل الصغير */
            .header-tools { margin: 0 auto; }
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <!-- Header -->
    <header class="app-header">
        <!-- الأزرار (يسار) -->
        <div class="header-tools">
            <div class="tool-group" onclick="toggleView()">
                <div class="tool-btn" id="viewToggle">
                    <i class="material-icons">phone_android</i>
                </div>
                <span class="tool-label">عرض</span>
            </div>

            <div class="tool-group" onclick="toggleSidebar()">
                <div class="tool-btn">
                    <i class="material-icons">menu</i>
                </div>
                <span class="tool-label">قائمة</span>
            </div>
        </div>

        <!-- البروفايل (وسط) -->
        <div class="profile-container">
            <div class="profile-card">
                <div class="profile-img">
                    <img src="https://iili.io/fbckoRn.md.jpg" alt="Marwa">
                </div>
                <div class="profile-info">
                    <span class="profile-name">مروة محمد</span>
                    <i class="material-icons verified-icon">verified</i>
                </div>
            </div>
        </div>
    </header>

    <!-- Viewer -->
    <main class="viewer-area desktop-mode" id="viewerArea">
        <iframe id="output"></iframe>
    </main>

    <!-- Sidebar -->
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title"><i class="material-icons">code</i> محرر الكود الاحترافي</span>
            <button class="close-sidebar" onclick="toggleSidebar()"><i class="material-icons">close</i></button>
        </div>
        
        <div class="editor-wrapper">
            <div class="code-wrapper">
                <!-- محرر نصي خام للسرعة القصوى -->
                <textarea id="codeEditor" spellcheck="false" placeholder="<!-- الصق الكود هنا للتحديث الفوري -->"></textarea>
            </div>
            
            <div class="action-grid">
                <button class="btn btn-primary" onclick="doPaste()">
                    <i class="material-icons">content_paste</i> لصق كود
                </button>
                <button class="btn btn-danger" onclick="doDelete()">
                    <i class="material-icons">delete</i> حذف الكل
                </button>
            </div>
        </div>
    </aside>

    <!-- Toast -->
    <div class="toast-container" id="toastContainer">
        <div class="toast">
            <i class="material-icons">check_circle</i>
            <span id="toastText">تمت العملية</span>
        </div>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const editor = document.getElementById('codeEditor');
        const output = document.getElementById('output');
        const viewerArea = document.getElementById('viewerArea');
        const viewToggle = document.getElementById('viewToggle');
        const toastContainer = document.getElementById('toastContainer');
        const toastText = document.getElementById('toastText');

        let isMobile = false;
        let updateTimeout;

        // Default Template
        const defaultCode = `<!DOCTYPE html>
<html>
<head>
<style>
  body { 
    display: flex; justify-content: center; align-items: center; 
    height: 100vh; background: #f0f2f5; font-family: sans-serif;
  }
  .card {
    background: white; padding: 20px; border-radius: 15px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center;
  }
  h1 { color: #d4af37; }
</style>
</head>
<body>
  <div class="card">
    <h1>مروة محمد</h1>
    <p>النظام الملكي الاحترافي</p>
  </div>
</body>
</html>`;

        // Initialize
        editor.value = defaultCode;
        update();

        function toggleSidebar() {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }

        function toggleView() {
            isMobile = !isMobile;
            if (isMobile) {
                viewerArea.classList.remove('desktop-mode');
                viewerArea.classList.add('mobile-mode');
                viewToggle.innerHTML = '<i class="material-icons">computer</i>';
                viewToggle.classList.add('active');
                showToast("وضع الهاتف مفعل", "phone_android");
            } else {
                viewerArea.classList.remove('mobile-mode');
                viewerArea.classList.add('desktop-mode');
                viewToggle.innerHTML = '<i class="material-icons">phone_android</i>';
                viewToggle.classList.remove('active');
                showToast("الشاشة الكاملة", "computer");
            }
        }

        // Fast Update Function (Optimized for 10k+ lines)
        function update() {
            const content = editor.value;
            const doc = output.contentWindow.document;
            // استخدام document.write هو الأسرع للتحديث الفوري
            doc.open();
            doc.write(`
                <!DOCTYPE html>
                <html lang="ar" dir="rtl">
                <head>
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <style>
                        body { margin: 0; padding: 0; font-family: sans-serif; overflow-x: hidden; }
                        img, table, div { max-width: 100%; height: auto; box-sizing: border-box; }
                        a { text-decoration: none; }
                    </style>
                </head>
                <body>${content}</body>
                </html>
            `);
            doc.close();
        }

        // Input Handler with Debounce for typing
        editor.addEventListener('input', () => {
             if (updateTimeout) clearTimeout(updateTimeout);
             // تحديث فوري عند التوقف عن الكتابة
             updateTimeout = setTimeout(update, 50);
        });

        // Paste Function
        async function doPaste() {
            try {
                const text = await navigator.clipboard.readText();
                editor.value += text;
                update();
                showToast("تم اللصق والتشغيل", "content_paste");
            } catch (err) {
                showToast("تعذر اللصق", "error");
            }
        }

        // Delete Function
        function doDelete() {
            editor.value = "";
            update();
            showToast("تم الحذف", "delete");
        }

        function showToast(msg, icon) {
            toastText.textContent = msg;
            toastContainer.querySelector('i').textContent = icon;
            toastContainer.classList.add('show');
            setTimeout(() => toastContainer.classList.remove('show'), 2000);
        }

        // Periodic Auto-Update (Backup Loop)
        setInterval(() => {
            update();
        }, 1000);

    </script>
</body>
</html>
